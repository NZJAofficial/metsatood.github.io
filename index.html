<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metsatööde päevik - Sisselogimine</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
    <div class="container" id="login-container">
        <h1>Metsatööde päevik</h1>
        <div id="login-form">
            <h2>Sisselogimine</h2>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-password" placeholder="Parool">
            <button type="button" onclick="login()">Logi sisse</button>
            <p>Pole kontot? <a href="#" onclick="showRegister()">Registreeru</a></p>
        </div>
        <div id="register-form" style="display:none;">
            <h2>Registreerumine</h2>
            <input type="text" id="reg-name" placeholder="Täisnimi">
            <input type="email" id="reg-email" placeholder="E-mail">
            <input type="password" id="reg-password" placeholder="Parool">
            <select id="reg-machine-type">
                <option value="harvester">Harvester</option>
                <option value="forvarder">Forvarder</option>
            </select>
            <input type="text" id="reg-machine-name" placeholder="Masina nimi">
            <button type="button" onclick="register()">Registreeru</button>
            <p>Juba on konto? <a href="#" onclick="showLogin()">Logi sisse</a></p>
        </div>
    </div>

    <script>
        // Funktsioonid vormide vahetamiseks
        function showRegister() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
        }
        function showLogin() {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('register-form').style.display = 'none';
        }

        // Sisselogimine
        function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            console.log('Login attempted with:', email);
            auth.signInWithEmailAndPassword(email, password)
                .then(userCredential => {
                    console.log('Login success', userCredential.user);
                    // Suunamine toimub onAuthStateChanged kaudu, aga võime ka ise suunata
                    // Siiski laseme kuulajal teha töö
                })
                .catch(error => {
                    console.error('Login error', error);
                    alert('Viga sisselogimisel: ' + error.message);
                });
        }

        // Registreerimine
        function register() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const machineType = document.getElementById('reg-machine-type').value;
            const machineName = document.getElementById('reg-machine-name').value;

            auth.createUserWithEmailAndPassword(email, password)
                .then(cred => {
                    // Lisa kasutaja andmed Firestore'i, ootel kinnitus
                    return db.collection('users').doc(cred.user.uid).set({
                        name: name,
                        email: email,
                        machineType: machineType,
                        machineName: machineName,
                        role: 'user',
                        active: false,
                        trialEnds: null,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(() => {
                    alert('Registreerimine õnnestus! Oota admini kinnitust.');
                    return auth.signOut(); // Logi välja
                })
                .catch(error => {
                    console.error('Registration error', error);
                    alert('Viga registreerimisel: ' + error.message);
                });
        }

        // Kuula sisselogimise olekut
        auth.onAuthStateChanged(user => {
            console.log('Auth state changed:', user);
            if (user) {
                // Kasutaja on sisse logitud, suuna vastavalt rollile
                db.collection('users').doc(user.uid).get().then(doc => {
                    if (doc.exists) {
                        const userData = doc.data();
                        const currentPath = window.location.pathname;
                        if (userData.role === 'admin' && !currentPath.includes('admin.html')) {
                            window.location.href = 'admin.html';
                        } else if (userData.role !== 'admin' && !currentPath.includes('dashboard.html')) {
                            window.location.href = 'dashboard.html';
                        }
                        // Kui juba õigel lehel, ei tee midagi
                    } else {
                        console.warn('User document missing, signing out');
                        auth.signOut();
                    }
                }).catch(err => {
                    console.error('Error getting user doc', err);
                });
            } else {
                // Pole sisse logitud, näita sisselogimisvormi (kui pole juba index.html)
                // Aga kui oleme mõnel muul lehel, suuname index.html
                const currentPath = window.location.pathname;
                if (!currentPath.includes('index.html')) {
                    window.location.href = 'index.html';
                }
            }
        });
    </script>
</body>
</html>
